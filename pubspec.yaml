name: homserv
description: "Home services platform for customers and providers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # UI Icons
  cupertino_icons: ^1.0.8

  # Supabase (Backend)
  supabase_flutter: ^2.0.0

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^13.0.0

  # Local Storage
  shared_preferences: ^2.2.0

  # Utilities
  intl: ^0.18.0

  # Google Maps & Location
  google_maps_flutter: ^2.5.0
  geocoding: ^2.1.0
  geolocator: ^10.1.0

  provider: ^6.1.0

  google_maps_webservice: ^0.0.20-nullsafety.5
  #for image picking 
  image_picker: ^1.0.5
  url_launcher: ^6.3.0

  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true